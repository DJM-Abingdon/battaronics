<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GCSE Electronics: Grand Slam Tennis (Keyboard Edition)</title>
    <style>
        :root {
            --grass-green: #38b000;
            --court-line: #ffffff;
            --court-blue: #0077b6;
            --ball-yellow: #ccff00;
            --panel-bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #74c69d, #40916c);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #1b4332;
        }

        .game-container {
            display: flex;
            gap: 20px;
            max-width: 1100px;
            width: 100%;
        }

        .court-wrapper {
            position: relative;
            background-color: var(--grass-green);
            border: 8px solid #2d6a4f;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        #tennisCanvas {
            background-color: var(--court-blue);
            border: 4px solid var(--court-line);
            display: block;
            border-radius: 4px;
        }

        .side-panel {
            flex: 1;
            background: var(--panel-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 320px;
        }

        .scoreboard {
            background: #212529;
            color: #fff;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            font-family: 'Courier New', monospace;
        }

        .score-row {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            margin: 5px 0;
        }

        .score-val {
            font-weight: bold;
            color: var(--ball-yellow);
            font-size: 22px;
        }

        .quiz-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 255, 255, 0.98);
            border: 4px solid #ffb703;
            border-radius: 16px;
            width: 85%;
            max-width: 500px;
            padding: 20px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: none;
            z-index: 10;
        }

        .quiz-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e9ecef;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .timer-badge {
            background: #ffb703;
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        .option-btn {
            background: #ffffff;
            border: 2px solid #ced4da;
            border-radius: 8px;
            color: #212529;
            padding: 12px;
            margin: 8px 0;
            width: 100%;
            text-align: left;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .option-btn:hover {
            background: #e3f2fd;
            border-color: var(--court-blue);
            transform: translateY(-2px);
        }

        .commentary-box {
            background: #e9f5db;
            border-left: 5px solid #718355;
            padding: 12px;
            border-radius: 4px;
            height: 120px;
            overflow-y: auto;
            font-size: 14px;
            color: #4f5d3d;
        }

        .shot-alert {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 20px;
            text-align: center;
            margin: 10px 0;
            min-height: 24px;
        }
    </style>
</head>
<body>

<div style="text-align: center; margin-bottom: 15px;">
    <h1 style="margin: 0; color: white; text-shadow: 0 2px 4px rgba(0,0,0,0.2);">🎾 ELECTRONICS GRAND SLAM</h1>
    <p style="margin: 5px 0; color: #d8f3dc; font-weight: bold;">Use <b>UP / DOWN ARROWS</b> or Mouse to move. Hit fast for an AMAZING SMASH!</p>
</div>

<div class="game-container">
    <div class="court-wrapper">
        <canvas id="tennisCanvas" width="600" height="450"></canvas>

        <div id="quiz-overlay" class="quiz-overlay">
            <div class="quiz-header">
                <span style="font-weight: bold; color: var(--court-blue);" id="shot-type-indicator">🎾 YOUR SHOT!</span>
                <span class="timer-badge" id="shot-timer">Timer: 0.0s</span>
            </div>
            <p id="question-text" style="font-weight: 500; font-size: 15px; margin-top: 0;"></p>
            <div id="options-container"></div>
        </div>
    </div>

    <div class="side-panel">
        <div>
            <h3 style="margin-top:0; border-bottom: 2px solid #dee2e6; padding-bottom:5px;">📊 MATCH STANDINGS</h3>
            <div class="scoreboard">
                <div style="font-size:12px; color: #aaa; margin-bottom: 5px;" id="server-indicator">CURRENT SERVER: PLAYER</div>
                <div class="score-row">
                    <span>👤 PLAYER (YOU)</span>
                    <span class="score-val" id="player-tennis-score">0</span>
                </div>
                <div class="score-row">
                    <span>🤖 COMPUTER AI</span>
                    <span class="score-val" id="computer-tennis-score">0</span>
                </div>
                <div style="border-top: 1px dashed #444; margin-top: 10px; padding-top: 5px; font-size: 13px; display: flex; justify-content: space-around;">
                    <span>Game Match: <b id="current-game-num">1/2</b></span>
                </div>
            </div>
        </div>

        <div>
            <div id="shot-alert-text" class="shot-alert"></div>
            <h4>🎙️ MATCH COMMENTARY</h4>
            <div id="commentary" class="commentary-box">
                Game 1: Player to serve. Ready... Play!
            </div>
        </div>
    </div>
</div>

<script>
    // 1. QUESTION CONSTRUCTOR
    function buildTennisQuestions() {
        let pool = [];
        const edges = ["Rising Edge (LOW to HIGH transition)", "Falling Edge (HIGH to LOW transition)", "Steady logic state duration", "Floating logic lines"];
        const bcd = ["BCD decoders only recognize distinct decimal states 0 through 9", "The chip demands synchronized high-voltage pulses", "The pin layout runs in active-low reverse loops", "The decade array crashes at logic 8 limits"];

        for(let i=1; i<=25; i++) {
            pool.push({ q: `[Flip-Flops] Quiz Pin #${i}: At which specific logic transition point does a rising-edge triggered D-type flip-flop register updates from D to Q?`, a: [...edges], correct: edges[0] });
        }
        for(let i=1; i<=25; i++) {
            let f = 200 * (i % 4 + 1);
            pool.push({ q: `[Ripple Frequency] Problem #${i}: In a standard multi-stage ripple binary counter loop, if node output A executes at ${f}Hz, what output frequency is processed at node B?`, a: [`${f/2}Hz`, `${f*2}Hz`, `${f}Hz`, `${f/4}Hz`], correct: `${f/2}Hz` });
        }
        for(let i=1; i<=25; i++) {
            let m = (i % 3) + 5;
            let ans = m === 6 ? "Outputs B and C (0110)" : m === 5 ? "Outputs A and C (0101)" : "Outputs A, B, and C (0111)";
            pool.push({ q: `[Modulo Loops] Configuration Loop #${i}: To wire a 4-bit synchronous counter chip into an exact Modulo-${m} sequence, which outputs must route into the reset AND gate?`, a: [ans, "Outputs A and B (0011)", "Outputs A and D (1001)", "Line left grounded"], correct: ans });
        }
        return pool;
    }

    let quizDatabase = buildTennisQuestions();
    let quizPointer = 0;

    let tennisScores = ["0", "15", "30", "40", "Game"];
    let playerIdx = 0;
    let computerIdx = 0;
    let currentGameNum = 1; 

    const canvas = document.getElementById('tennisCanvas');
    const ctx = canvas.getContext('2d');

    let ball = { x: 300, y: 225, vx: 4, vy: 2, radius: 8, speedType: 'normal' };
    let playerPaddle = { x: 40, y: 190, width: 12, height: 75 };
    let computerPaddle = { x: 548, y: 190, width: 12, height: 75 };

    let isBallInPlay = true;
    let questionActive = false;
    let responseTimer = 0;
    let timerInterval = null;

    // Keyboard Tracking Flags
    let keysPressed = {};
    window.addEventListener('keydown', (e) => { keysPressed[e.key] = true; });
    window.addEventListener('keyup', (e) => { keysPressed[e.key] = false; });

    // Backup Mouse Controls
    canvas.addEventListener('mousemove', function(e) {
        if(questionActive) return;
        let box = canvas.getBoundingClientRect();
        let targetY = e.clientY - box.top - playerPaddle.height / 2;
        playerPaddle.y = Math.max(10, Math.min(canvas.height - playerPaddle.height - 10, targetY));
    });

    function addCommentary(msg) {
        let box = document.getElementById('commentary');
        box.innerHTML = `🎾 ${msg}<br>` + box.innerHTML;
    }

    function displayShotAlert(text, color) {
        let el = document.getElementById('shot-alert-text');
        el.innerText = text; el.style.color = color;
    }

    function triggerQuestionSequence() {
        if (questionActive) return;
        questionActive = true;
        isBallInPlay = false;

        let questionItem = quizDatabase[quizPointer % quizDatabase.length];
        document.getElementById('question-text').innerText = questionItem.q;

        let randomizedOptions = [...questionItem.a];
        randomizedOptions.sort(() => Math.random() - 0.5);

        let container = document.getElementById('options-container');
        container.innerHTML = "";

        randomizedOptions.forEach(optText => {
            let btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = optText;
            btn.onclick = function() { evaluateAnswer(optText, questionItem.correct); };
            container.appendChild(btn);
        });

        responseTimer = 0;
        document.getElementById('quiz-overlay').style.display = "block";
        timerInterval = setInterval(() => {
            responseTimer += 0.1;
            document.getElementById('shot-timer').innerText = `Timer: ${responseTimer.toFixed(1)}s`;
        }, 100);
    }

    function evaluateAnswer(selected, correct) {
        clearInterval(timerInterval);
        document.getElementById('quiz-overlay').style.display = "none";
        questionActive = false;
        quizPointer++;

        if (selected === correct) {
            if (responseTimer <= 3.0) {
                ball.speedType = 'smash'; ball.vx = 9;
                displayShotAlert("🚀 AMAZING SMASH SHOT!", "#d90429");
                addCommentary("Player executes an incredible high-voltage smash return!");
            } else if (responseTimer <= 8.0) {
                ball.speedType = 'normal'; ball.vx = 5;
                displayShotAlert("Good Return", "#0077b6");
                addCommentary("Player sends a clean return cross-court.");
            } else {
                ball.speedType = 'weak'; ball.vx = 3.5;
                displayShotAlert("Weak Return", "#7b2cbf");
                addCommentary("Slow return! A floating chip shot is sent over.");
            }
            ball.vy = (Math.random() - 0.5) * 5;
            ball.x = playerPaddle.x + playerPaddle.width + 5; // Nudge out of paddle bounds
            isBallInPlay = true;
        } else {
            displayShotAlert("❌ MISS / UNFORCED ERROR", "red");
            addCommentary("Wrong answer! Unforced circuitry error gives AI the point.");
            awardPoint('computer');
        }
    }

    // Fixed AI logic loop tracking the ball
    function handleAI() {
        if (!isBallInPlay || questionActive) return;
        
        let aiTarget = ball.y - (computerPaddle.height / 2);
        // Adjust reaction speeds depending on shot intensity
        let speedModifier = ball.speedType === 'smash' ? 2.5 : 4.0;
        
        if (computerPaddle.y < aiTarget) {
            computerPaddle.y += speedModifier;
        } else if (computerPaddle.y > aiTarget) {
            computerPaddle.y -= speedModifier;
        }
        computerPaddle.y = Math.max(10, Math.min(canvas.height - computerPaddle.height - 10, computerPaddle.y));

        // Intercept Boundaries
        if (ball.x >= computerPaddle.x - 8 && ball.vx > 0) {
            if (ball.y >= computerPaddle.y && ball.y <= computerPaddle.y + computerPaddle.height) {
                let slipChance = ball.speedType === 'smash' ? 0.40 : 0.08;
                if (Math.random() < slipChance) {
                    addCommentary("The AI misjudges the velocity! Clean point to player.");
                    awardPoint('player');
                } else {
                    ball.vx = -5;
                    ball.speedType = 'normal';
                    ball.vy = (Math.random() - 0.5) * 4;
                    addCommentary("Computer safely tracks the volley and clears it.");
                }
            } else {
                awardPoint('player');
            }
        }
    }

    function awardPoint(winner) {
        isBallInPlay = false;
        if (winner === 'player') playerIdx++; else computerIdx++;
        addCommentary(`Point to ${winner === 'player' ? 'Player' : 'Computer'}!`);

        if (playerIdx >= 4 && playerIdx - computerIdx >= 2) { handleGameWin('player'); return; }
        if (computerIdx >= 4 && computerIdx - playerIdx >= 2) { handleGameWin('computer'); return; }

        updateScoreboardDisplay();
        resetBallDelivery();
    }

    function handleGameWin(winner) {
        if (currentGameNum === 1) {
            alert(`🏆 GAME 1 COMPLETE! Winner: ${winner.toUpperCase()}.\nGame 2: Computer Serves next.`);
            currentGameNum = 2; playerIdx = 0; computerIdx = 0;
            document.getElementById('current-game-num').innerText = "2/2";
            document.getElementById('server-indicator').innerText = "CURRENT SERVER: COMPUTER AI";
            updateScoreboardDisplay(); resetBallDelivery();
        } else {
            alert(`🏁 MATCH CONCLUDED!\nBoth games finished. Score values safely stored.`);
            currentGameNum = 1; playerIdx = 0; computerIdx = 0;
            document.getElementById('current-game-num').innerText = "1/2";
            document.getElementById('server-indicator').innerText = "CURRENT SERVER: PLAYER";
            updateScoreboardDisplay(); resetBallDelivery();
        }
    }

    function updateScoreboardDisplay() {
        let pScore = tennisScores[Math.min(playerIdx, 4)];
        let cScore = tennisScores[Math.min(computerIdx, 4)];
        if (playerIdx >= 3 && computerIdx >= 3) {
            if (playerIdx === computerIdx) { pScore = "40"; cScore = "40"; }
            else if (playerIdx > computerIdx) { pScore = "ADV"; cScore = "40"; }
            else { pScore = "40"; cScore = "ADV"; }
        }
        document.getElementById('player-tennis-score').innerText = pScore;
        document.getElementById('computer-tennis-score').innerText = cScore;
    }

    function resetBallDelivery() {
        ball.x = 300; ball.y = 225;
        ball.vx = currentGameNum === 1 ? 4 : -4;
        ball.vy = (Math.random() - 0.5) * 3;
        ball.speedType = 'normal';
        isBallInPlay = true;
    }

    function processKeyboardInputs() {
        if(questionActive) return;
        let keyboardMoveSpeed = 5;
        if (keysPressed['ArrowUp'] || keysPressed['w']) {
            playerPaddle.y -= keyboardMoveSpeed;
        }
        if (keysPressed['ArrowDown'] || keysPressed['s']) {
            playerPaddle.y += keyboardMoveSpeed;
        }
        playerPaddle.y = Math.max(10, Math.min(canvas.height - playerPaddle.height - 10, playerPaddle.y));
    }

    function updatePhysicsEngineLoop() {
        processKeyboardInputs();
        handleAI();

        if (isBallInPlay && !questionActive) {
            ball.x += ball.vx;
            ball.y += ball.vy;

            if (ball.y <= 10 || ball.y >= canvas.height - 10) ball.vy = -ball.vy;

            // Collision intercept parameters with player paddle
            if (ball.x <= playerPaddle.x + playerPaddle.width && ball.vx < 0) {
                if (ball.y >= playerPaddle.y && ball.y <= playerPaddle.y + playerPaddle.height) {
                    triggerQuestionSequence();
                } else if (ball.x < playerPaddle.x - 15) {
                    addCommentary("Ball misses your racket zone!");
                    awardPoint('computer');
                }
            }
        }

        renderGraphics();
        requestAnimationFrame(updatePhysicsEngineLoop);
    }

    function renderGraphics() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.4)";
        ctx.lineWidth = 3;
        
        ctx.beginPath();
        ctx.setLineDash([10, 10]);
        ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height);
        ctx.stroke(); ctx.setLineDash([]);
        ctx.strokeRect(15, 15, canvas.width - 30, canvas.height - 30);

        // Player (Blue)
        ctx.fillStyle = "#00b4d8";
        ctx.fillRect(playerPaddle.x, playerPaddle.y, playerPaddle.width, playerPaddle.height);

        // Computer (Red)
        ctx.fillStyle = "#e63946";
        ctx.fillRect(computerPaddle.x, computerPaddle.y, computerPaddle.width, computerPaddle.height);

        // Ball Graphics
        ctx.beginPath();
        ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
        if (ball.speedType === 'smash') {
            ctx.fillStyle = "#ff0055"; ctx.shadowBlur = 15; ctx.shadowColor = "#ffb703";
        } else {
            ctx.fillStyle = "#ccff00"; ctx.shadowBlur = 0;
        }
        ctx.fill(); ctx.closePath(); ctx.shadowBlur = 0;
    }

    resetBallDelivery();
    updatePhysicsEngineLoop();
</script>

</body>
</html>
